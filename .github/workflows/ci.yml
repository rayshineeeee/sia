name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: |
          uv pip install --system python-dotenv numpy pandas scikit-learn

      - name: Check Python syntax
        run: |
          python -m py_compile orchestration/orchestrator.py
          python -m py_compile orchestration/context_manager.py
          python -m py_compile orchestration/util.py
          echo "All modules compile successfully"

      - name: Verify core imports
        run: |
          cd orchestration
          python -c "from context_manager import ContextManager; print('context_manager OK')"
          python -c "import util; print('util OK')"

      - name: Build package
        run: |
          uv pip install --system build
          python -m build --sdist --wheel

      - name: Verify built artifacts
        run: |
          ls -la dist/
          test -f dist/*.tar.gz
          test -f dist/*.whl

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install test dependencies
        run: |
          uv pip install --system pytest numpy pandas scikit-learn python-dotenv

      - name: Run tests
        run: |
          python -m pytest tests/ -v

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install linters
        run: |
          uv pip install --system ruff ty

      - name: Ruff check
        run: ruff check orchestration/ tests/

      - name: Ruff format check
        run: ruff format --check orchestration/ tests/

      - name: Type check with ty
        run: ty check orchestration/
